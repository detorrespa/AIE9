# ARIA — Qdrant con persistencia en disco local (no en RunPod)
# Uso: docker compose up -d
# Datos en ./qdrant_storage (local, persistente)

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: aria_qdrant
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_storage:/qdrant/storage
    restart: unless-stopped
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
